wantType:
  metadata:
    name: smartgolf_check_reserved
    title: SmartGolf Check Reserved
    description: |
      Checks whether there is an upcoming (future) SmartGolf reservation by scraping
      the reservations page via Playwright. Completes after a single execution.
    version: '1.0'
    category: smartgolf
    pattern: independent

  finalResultField: is_reserved

  state:
    - name: skill_timeout_seconds
      description: Max seconds to wait for the skill script to complete (default 120)
      type: int
      label: goal
      persistent: false
      initialValue: 120

    - name: skill_path
      description: Path to the MRS skill script (set by onInitialize)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: mrs_raw_output
      description: Raw JSON output from the MRS skill (source for fetchFrom fields)
      type: object
      label: current
      persistent: false
      initialValue: null

    - name: status
      description: Execution status (pending, done, failed)
      type: string
      label: current
      persistent: true
      initialValue: "pending"

    - name: error
      description: Error message if execution failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: is_reserved
      description: True if a future reservation exists
      type: boolean
      label: current
      persistent: true
      initialValue: false
      fetchFrom: mrs_raw_output
      onFetchData: "is_reserved"

    - name: reservations
      description: Full reservation list from the skill output
      type: object
      label: current
      persistent: true
      initialValue: {}
      fetchFrom: mrs_raw_output
      onFetchData: "reservations"

    - name: next_datetime
      description: Datetime of the first reservation
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0].datetime"

    - name: next_store
      description: Store name of the first reservation
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0].store"

    - name: next_room
      description: Room name of the first reservation
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0].room"

    - name: checked_at
      description: JST timestamp when the check was performed (YYYY-MM-DD HH:MM)
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "checked_at"

  onInitialize:
    current:
      status: "pending"
      skill_path: "~/.mywant/custom-types/mywant-smartgolf-check-reserved-plugin/main.py"

  requires:
    - monitor_mrs_agent

  examples:
    - name: Check SmartGolf Reservation
      description: Check whether there is an upcoming SmartGolf reservation
      want:
        metadata:
          name: check_smartgolf_reserved
          type: smartgolf_check_reserved
        spec:
          exposes:
            - currentState: is_reserved
              as: is_reserved
            - currentState: next_datetime
              as: next_datetime
            - currentState: next_store
              as: next_store
