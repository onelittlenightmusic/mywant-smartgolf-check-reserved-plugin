wantType:
  metadata:
    name: smartgolf_check_reserved
    title: SmartGolf Check Reserved
    description: |
      Checks whether there is an upcoming (future) SmartGolf reservation by scraping
      the reservations page via Playwright. Completes after a single execution.
    version: '1.0'
    category: smartgolf
    pattern: independent
    labels:
      category-icon: Flag
      category-bg-light: "linear-gradient(160deg, #bbf7d0 0%, #dcfce7 100%)"
      category-bg-dark: "linear-gradient(160deg, #166534 0%, #052e16 100%)"

  finalResultField: current_reservation

  state:
    - name: skill_timeout_seconds
      description: Max seconds to wait for the skill script to complete (default 120)
      type: int
      label: goal
      persistent: false
      initialValue: 120

    - name: skill_path
      description: Path to the MRS skill script (set by onInitialize)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: mrs_raw_output
      description: Raw JSON output from the MRS skill (source for fetchFrom fields)
      type: object
      label: current
      persistent: false
      initialValue: null

    - name: error
      description: Error message if execution failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    - name: summary
      description: Human-readable progress summary updated by monitor_mrs_agent
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: is_reserved
      description: >
        Whether a future SmartGolf reservation already exists.
        True means the user already has an upcoming booking and may not need to book again.
      type: boolean
      label: current
      persistent: true
      initialValue: null
      exposable: true
      fetchFrom: mrs_raw_output
      onFetchData: "is_reserved"

    - name: reservations
      description: Full list of upcoming SmartGolf reservations with store/room/datetime details
      type: object
      label: current
      persistent: true
      initialValue: {}
      exposable: true
      fetchFrom: mrs_raw_output
      onFetchData: "reservations"

    - name: next_datetime
      description: Date and time of the user's next upcoming SmartGolf reservation (YYYY-MM-DD HH:MM)
      type: string
      label: current
      persistent: true
      initialValue: ""
      exposable: true
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0].datetime"

    - name: next_store
      description: Store name of the user's next upcoming SmartGolf reservation (e.g. 北新宿店)
      type: string
      label: current
      persistent: true
      initialValue: ""
      exposable: true
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0].store"

    - name: next_room
      description: Room name of the user's next upcoming SmartGolf reservation (e.g. 右打席予約(Room01))
      type: string
      label: current
      persistent: true
      initialValue: ""
      exposable: true
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0].room"

    - name: current_reservation
      description: Next upcoming SmartGolf reservation as a JSON object {room, datetime, store, status}
      type: object
      label: current
      persistent: true
      initialValue: null
      exposable: true
      fetchFrom: mrs_raw_output
      onFetchData: "reservations[0]"

    - name: checked_at
      description: JST timestamp when the reservation check was last performed (YYYY-MM-DD HH:MM)
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "checked_at"

  finalizeWhen:
    achieved:
      field: mrs_raw_output
      operator: "!="
      value: null
    failed:
      field: error
      operator: "!="
      value: ""

  onInitialize:
    current:
      skill_path: "~/.mywant/custom-types/mywant-smartgolf-check-reserved-plugin/main.py"

  requires:
    - monitor_mrs_agent

  examples:
    - name: Check SmartGolf Reservation
      description: Check whether there is an upcoming SmartGolf reservation
      want:
        metadata:
          name: check_smartgolf_reserved
          type: smartgolf_check_reserved
        spec:
          exposes:
            - currentState: is_reserved
              as: is_reserved
            - currentState: next_datetime
              as: next_datetime
            - currentState: next_store
              as: next_store
